<!DOCTYPE html>
<html>
<head>
    <title>Search History</title>
</head>
<body>

<h1>Weather Search History</h1>

<table border="1">
    <tr>
        <th>City</th>
        <th>Temp</th>
        <th>Condition</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
